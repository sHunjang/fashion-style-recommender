# configs/config.yaml

# ----------------------------------------
# 모델 설정
# ----------------------------------------
model:
  clip_model: "openai/clip-vit-base-patch32"
  embed_dim: 512
  batch_size: 64
  device: "cuda"

# ----------------------------------------
# 데이터 설정
# ----------------------------------------
data:
  image_size: 224
  max_images: 10000
  data_dir: "data/raw"
  processed_dir: "data/processed"
  index_dir: "data/index"

# ----------------------------------------
# 검색 설정
# ----------------------------------------
search:
  top_k: 10
  nlist: 100
  nprobe: 10

# ----------------------------------------
# API 설정
# ----------------------------------------
api:
  host: "0.0.0.0"
  port: 8000
  max_file_size_mb: 10

# ----------------------------------------
# 로깅
# ----------------------------------------
logging:
  level: "INFO"
  format: "%(asctime)s | %(levelname)s | %(message)s"