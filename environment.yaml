# environment.yaml
# 사용법: conda env create -f environment.yaml

name: fashion-cv

channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  # Python
  - python=3.10

  # PyTorch + CUDA
  - pytorch>=2.0.0
  - torchvision>=0.15.0
  - pytorch-cuda=12.8

  # FAISS (conda로만 설치 가능!)
  # - faiss-gpu=1.9.0     # GPU 버전
  - faiss-cpu=1.9.0   # GPU 안 될 시 대체

  # pip으로 설치할 패키지
  - pip
  - pip:
    - opencv-python-headless>=4.8.0
    - Pillow>=10.0.0
    - transformers>=4.35.0
    - huggingface_hub>=0.19.0
    - fastapi>=0.104.0
    - uvicorn>=0.24.0
    - gradio>=4.0.0
    - python-multipart>=0.0.6
    - numpy>=1.24.0
    - pandas>=2.0.0
    - pyyaml>=6.0
    - tqdm>=4.66.0
    - matplotlib>=3.7.0
    - seaborn>=0.12.0
    - requests>=2.31.0
    - python-dotenv>=1.0.0
    - pytest>=7.4.0